<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tursporer Pro</title>
    
    <link rel="apple-touch-icon" href="icon_ny_v2.png">
    <link rel="icon" type="image/png" href="icon_ny_v2.png">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root {
            --primary: #007bff;
            --danger: #dc3545;
            --dark: #121212;
            --card-bg: rgba(30, 30, 30, 0.9);
            --text: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--dark);
            overflow: hidden;
            color: var(--text);
        }

        #map { height: 100%; width: 100%; z-index: 1; }
        .overlay { position: absolute; z-index: 1000; pointer-events: none; }

        .header-stats {
            top: 0; left: 0; right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px 10px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #333;
            pointer-events: auto;
        }

        .stat-box { flex: 1; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: #00ff88; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        .controls {
            bottom: 40px; left: 0; right: 0;
            display: flex; flex-direction: column;
            align-items: center; gap: 10px;
            pointer-events: auto;
        }

        .btn-group { display: flex; gap: 10px; justify-content: center; width: 90%; }

        button {
            padding: 18px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .btn-start { background: var(--primary); }
        .btn-stop { background: var(--danger); }
        .btn-new { background: #6c757d; }
        .btn-print { background: #28a745; font-size: 0.9rem; padding: 10px 20px; }
        .btn-clear { background: #ff9f43; font-size: 0.9rem; padding: 10px 20px; color: #121212; }
        
        button:active { transform: scale(0.95); }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999; pointer-events: auto;
        }

        input[type="password"] {
            padding: 15px; border-radius: 10px; border: none;
            margin-bottom: 20px; width: 200px; text-align: center; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 style="margin-bottom: 30px;">Tursporer Pro</h2>
        <input type="password" id="pwInput" placeholder="Passord..." autocorrect="off">
        <button class="btn-start" onclick="unlock()">Lås opp</button>
    </div>

    <div class="overlay header-stats">
        <div class="stat-box"><span class="stat-val" id="dist">0.00</span><span class="stat-label">KM</span></div>
        <div class="stat-box"><span class="stat-val" id="steps">0</span><span class="stat-label">SKRITT</span></div>
        <div class="stat-box"><span class="stat-val" id="elev">--</span><span class="stat-label">M.O.H</span></div>
        <div class="stat-box"><span class="stat-val" id="gain">0</span><span class="stat-label">STIGNING</span></div>
    </div>

    <div id="map"></div>

    <div class="overlay controls">
        <div class="btn-group">
            <button id="startBtn" class="btn-start" onclick="startTracking()">START</button>
            <button id="stopBtn" class="btn-stop" onclick="stopTracking()" style="display:none;">STOPP</button>
            <button id="resetBtn" class="btn-new" onclick="resetTour()">NY TUR (CSV)</button>
        </div>
        <div class="btn-group" style="width: auto; gap: 10px;">
            <button class="btn-print" onclick="saveRouteLocally()">LAGRE RUTE</button>
            <button class="btn-clear" onclick="clearCurrentRoute()">NULLSTILL RUTE</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const HEMMELIG_PASSORD = "Fjell";
        let map, path, userMarker, watchId, wakeLock = null;
        let coords = [];
        let totalDist = 0;
        let totalGain = 0;
        let lastAlt = null;
        let isTracking = false;
        let tourData = [["Tid", "Lat", "Lon", "Høyde", "Nøyaktighet"]]; 

        function unlock() {
            const pwField = document.getElementById('pwInput');
            const val = pwField.value;
            if (val === HEMMELIG_PASSORD) {
                pwField.value = ""; 
                document.getElementById('login-screen').style.display = 'none';
                initMap();
            } else {
                alert("Feil passord!");
            }
        }

        function initMap() {
            // Starter i Nordland
            map = L.map('map', { zoomControl: false }).setView([67.33, 15.40], 13);
            
            L.tileLayer('https://cache.kartverket.no/v1/wmts/1.0.0/topo/default/webmercator/{z}/{y}/{x}.png', {
                attribution: '&copy; <a href="http://www.kartverket.no/">Kartverket</a>',
                crossOrigin: true
            }).addTo(map);
            
            path = L.polyline([], { color: '#007bff', weight: 6, opacity: 0.8 }).addTo(map);
            userMarker = L.circleMarker([0, 0], { radius: 8, color: '#ffffff', fillColor: '#007bff', fillOpacity: 1, weight: 3 }).addTo(map);

            // NYTT: Sjekk om vi har en lagret rute i minnet når kartet åpnes
            const savedData = localStorage.getItem("tursporerData");
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    coords = data.coords || [];
                    totalDist = data.totalDist || 0;
                    totalGain = data.totalGain || 0;
                    tourData = data.tourData || [["Tid", "Lat", "Lon", "Høyde", "Nøyaktighet"]];

                    // Oppdater tellerne
                    document.getElementById('dist').innerText = totalDist.toFixed(2);
                    document.getElementById('steps').innerText = Math.round(totalDist * 1315);
                    document.getElementById('gain').innerText = Math.round(totalGain);

                    // Tegn ruten på kartet
                    if (coords.length > 0) {
                        path.setLatLngs(coords);
                        const lastPos = coords[coords.length - 1];
                        userMarker.setLatLng(lastPos);
                        map.setView(lastPos, 14); // Sentrerer på der du slapp
                    }
                } catch(e) { 
                    console.error("Kunne ikke laste lagret rute", e); 
                }
            }
        }

        // NYTT: Funksjon for å lagre ruten
        function saveRouteLocally() {
            const dataToSave = {
                coords: coords,
                totalDist: totalDist,
                totalGain: totalGain,
                tourData: tourData
            };
            localStorage.setItem("tursporerData", JSON.stringify(dataToSave));
            alert("Ruten er lagret! Du kan trygt lukke siden og fortsette senere. 💾");
        }

        async function startTracking() {
            isTracking = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) { console.log("WakeLock feilet"); }
            }
            
            watchId = navigator.geolocation.watchPosition(update, err => console.log("GPS-feil:", err.message), {
                enableHighAccuracy: true,
                maximumAge: 0, 
                timeout: 10000 
            });
        }

        function stopTracking() {
            isTracking = false;
            navigator.geolocation.clearWatch(watchId);
            if (wakeLock) { wakeLock.release(); wakeLock = null; }
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
        }

        function resetTour() {
            if(confirm("Vil du lagre turen og starte på nytt?")) {
                let csvContent = "data:text/csv;charset=utf-8," + tourData.map(e => e.join(";")).join("\n"); 
                let encodedUri = encodeURI(csvContent);
                let link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", "tur_logg.csv");
                document.body.appendChild(link);
                link.click();
                
                // Slett minnet ved ny tur også
                localStorage.removeItem("tursporerData");
                location.reload(); 
            }
        }

        function clearCurrentRoute() {
            if(confirm("Vil du slette gjeldende rute og nullstille alle tellere?")) {
                if (isTracking) {
                    stopTracking();
                }
                
                // NYTT: Sletter lagret data fra nettleserens minne
                localStorage.removeItem("tursporerData");

                coords = [];
                totalDist = 0;
                totalGain = 0;
                lastAlt = null;
                tourData = [["Tid", "Lat", "Lon", "Høyde", "Nøyaktighet"]];

                document.getElementById('dist').innerText = "0.00";
                document.getElementById('steps').innerText = "0";
                document.getElementById('gain').innerText = "0";
                document.getElementById('elev').innerText = "--";

                if (path) {
                    path.setLatLngs([]);
                }
            }
        }

        function update(pos) {
            if (!isTracking) return;
            const { latitude, longitude, altitude, accuracy } = pos.coords;
            
            if (accuracy > 20) return; 

            const newPos = [latitude, longitude];
            userMarker.setLatLng(newPos); 

            if (coords.length > 0) {
                const lastPos = L.latLng(coords[coords.length - 1]);
                const dist = lastPos.distanceTo(L.latLng(newPos));
                
                if (dist > 150 || dist < 1.5) return; 

                totalDist += (dist / 1000);
                document.getElementById('dist').innerText = totalDist.toFixed(2);
                document.getElementById('steps').innerText = Math.round(totalDist * 1315);
            }
            
            if (altitude !== null) {
                document.getElementById('elev').innerText = Math.round(altitude);
                if (lastAlt !== null && (altitude - lastAlt) > 1.5) { 
                    totalGain += (altitude - lastAlt);
                    document.getElementById('gain').innerText = Math.round(totalGain);
                }
                lastAlt = altitude;
            }

            coords.push(newPos);
            path.setLatLngs(coords);
            map.setView(newPos);
            tourData.push([new Date().toLocaleTimeString(), latitude, longitude, Math.round(altitude || 0), Math.round(accuracy)]);
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Tursporer: Offline-kart aktivert!', reg.scope))
                    .catch((err) => console.error('Feil med offline-kart:', err));
            });
        }
    </script>
</body>
</html>
