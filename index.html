<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tursporer</title>
    
    <!-- iPhone App instillinger -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tursporer">
    <!-- Bruk bildet jeg laget som ikon ved å lagre det som 'icon.png' og legge det i samme mappe -->
 <link rel="apple-touch-icon" href="icon_ny.png?v=2">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root { --primary: #00ff88; --dark: #1a1a1a; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: var(--dark); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #header { padding: 40px 20px 20px; text-align: center; background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; }
        .stats { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        #map { flex-grow: 1; width: 100%; }
        .controls { padding: 20px; background: #222; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 12px; border: none; cursor: pointer; transition: 0.2s; }
        .start-btn { background: var(--primary); color: black; }
        .history-container { max-height: 150px; overflow-y: auto; background: #111; padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div id="header">
    <div class="stats"><span id="dist">0.00</span> <small style="font-size: 1rem;">km</small></div>
    <div id="status">Klar for tur</div>
</div>

<div id="map"></div>

<div class="controls">
    <button id="startBtn" class="start-btn" onclick="toggleTracking()">START TUR</button>
    
    <div class="history-container" id="history">
        <strong style="display:block; margin-bottom: 5px;">Siste turer:</strong>
        <div id="historyList"></div>
    </div>
</div>
   



    // Lim det inn her, på innsiden av <script>
    navigator.geolocation.watchPosition(updatePosition, (err) => {
        console.warn('GPS-feil: ' + err.message);
    }, {
        enableHighAccuracy: true,
        maximumAge: 0
    });

   

    let map, path, watchId;
    let coordinates = [];
    let totalDistance = 0;
    let isTracking = false;

    function initMap() {
        // Vi fjerner zoomControl for et rent utseende på mobil
        map = L.map('map', { zoomControl: false }).setView([59.91, 10.75], 13);
        
        // NYTT: Standard fargerike kart fra OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);
        
        path = L.polyline([], {color: '#ff4444', weight: 6, opacity: 0.8}).addTo(map);
        
        // Prøv å finn posisjonen din med en gang appen åpnes
        map.locate({setView: true, maxZoom: 16});
        
        updateHistoryDisplay();
    }

    function toggleTracking() {
        if (!isTracking) {
            coordinates = [];
            totalDistance = 0;
            path.setLatLngs([]);
            isTracking = true;
            document.getElementById('startBtn').innerText = "STOPP OG LAGRE";
            document.getElementById('startBtn').style.background = "#ff4444";
            watchId = navigator.geolocation.watchPosition(updatePosition, null, {enableHighAccuracy: true});
        } else {
            stopTracking();
        }
    }

    function stopTracking() {
        navigator.geolocation.clearWatch(watchId);
        isTracking = false;
        document.getElementById('startBtn').innerText = "START NY TUR";
        document.getElementById('startBtn').style.background = "#00ff88";
        
        if (totalDistance > 0) saveTrip(totalDistance.toFixed(2));
    }

    let userMarker; // Denne holder styr på den blå prikken

    function updatePosition(position) {
        const { latitude, longitude } = position.coords;
        const newPos = [latitude, longitude];

        // 1. Oppdater eller lag den blå prikken
        if (!userMarker) {
            userMarker = L.circleMarker(newPos, {
                radius: 8,
                fillColor: "#007bff",
                color: "white",
                weight: 2,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);
        } else {
            userMarker.setLatLng(newPos);
        }

        // 2. Tegn ruta og regn ut km hvis vi tracker
        if (isTracking) {
            if (coordinates.length > 0) {
                const lastPos = coordinates[coordinates.length - 1];
                totalDistance += getDistance(lastPos[0], lastPos[1], latitude, longitude);
                document.getElementById('dist').innerText = totalDistance.toFixed(2);
            }
            coordinates.push(newPos);
            path.setLatLngs(coordinates);
        }

        // 3. Sentrer kartet på deg
        map.setView(newPos, 16);
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function saveTrip(dist) {
        let history = JSON.parse(localStorage.getItem('turHistory') || "[]");
        const date = new Date().toLocaleDateString('no-NO', {day:'numeric', month:'short'});
        history.unshift({ date, dist });
        localStorage.setItem('turHistory', JSON.stringify(history.slice(0, 10)));
        updateHistoryDisplay();
    }

    function updateHistoryDisplay() {
        let history = JSON.parse(localStorage.getItem('turHistory') || "[]");
        document.getElementById('historyList').innerHTML = history.map(t => 
            `<div class="history-item"><span>${t.date}</span> <b>${t.dist} km</b></div>`
        ).join('');
    }

    initMap();
</script>
</body>
</html>
