<!DOCTYPE html>
<html lang="no">
<head>
    <!-- Dette gir appen et skikkelig ikon på iPhone/Android -->
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2682/2682835.png">
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2682/2682835.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tursporer PWA</title>
    
    <!-- PWA meta tags for iOS og Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tursporer">
    
    <!-- Leaflet Kart CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --primary: #007bff;
            --danger: #dc3545;
            --dark: #121212;
            --card-bg: rgba(30, 30, 30, 0.9);
            --text: #ffffff;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--dark);
            overflow: hidden;
            color: var(--text);
        }

        #map { height: 100%; width: 100%; z-index: 1; }

        /* UI Overlays */
        .overlay {
            position: absolute;
            z-index: 1000;
            pointer-events: none;
        }

        .header-stats {
            top: 0; left: 0; right: 0;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 20px 10px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #333;
            pointer-events: auto;
        }

        .stat-box { text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: 800; color: #00ff88; display: block; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.7; }

        .controls {
            bottom: 40px; left: 0; right: 0;
            display: flex; justify-content: center;
            pointer-events: auto;
        }

        button {
            padding: 18px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }

        .btn-start { background: var(--primary); }
        .btn-stop { background: var(--danger); }
        button:active { transform: scale(0.95); }

        /* Passord-skjerm */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 80%;
            max-width: 300px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: white;
            font-size: 1.1rem;
            box-sizing: border-box;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2>🔒 Låst Tur-App</h2>
        <p style="opacity:0.7">Vennligst skriv inn passord</p>
        <input type="password" id="pwInput" placeholder="Passord...">
        <button class="btn-start" onclick="unlock()">Lås opp</button>
    </div>
</div>

<div class="overlay header-stats">
    <div class="stat-box">
        <span class="stat-val" id="dist">0.00</span>
        <span class="stat-label">KM</span>
    </div>
    <div class="stat-box">
        <span class="stat-val" id="elev">--</span>
        <span class="stat-label">M.O.H</span>
    </div>
    <div class="stat-box">
        <span class="stat-val" id="gain">0</span>
        <span class="stat-label">STIGNING</span>
    </div>
</div>

<div id="map"></div>

<div class="overlay controls">
    <button id="mainBtn" class="btn-start" onclick="toggleTracking()">START TUR</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // KONFIGURASJON
    const HEMMELIG_PASSORD = "Fjell"; // Du kan endre dette her

    let map, path, watchId;
    let coords = [];
    let totalDist = 0;
    let totalGain = 0;
    let lastAlt = null;
    let isTracking = false;

    function unlock() {
        const val = document.getElementById('pwInput').value;
        if (val === HEMMELIG_PASSORD) {
            document.getElementById('login-screen').style.display = 'none';
            initMap();
        } else {
            alert("Feil passord!");
        }
    }

    function initMap() {
        // Starter kartet sentrert på Nordland/Fauske-området
        map = L.map('map', { zoomControl: false }).setView([67.26, 15.39], 13);

        // Bruker Kartverket Topo4 for koter, stier og terreng i Norge
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

        path = L.polyline([], { color: '#007bff', weight: 6, opacity: 0.8 }).addTo(map);
    }

    function toggleTracking() {
        if (!isTracking) {
            if (!navigator.geolocation) return alert("Ingen GPS-støtte");
            isTracking = true;
            document.getElementById('mainBtn').innerText = "STOPP TUR";
            document.getElementById('mainBtn').className = "btn-stop";
            
            watchId = navigator.geolocation.watchPosition(update, err => console.log(err), {
                enableHighAccuracy: true,
                maximumAge: 1000
            });
        } else {
            navigator.geolocation.clearWatch(watchId);
            isTracking = false;
            document.getElementById('mainBtn').innerText = "START TUR";
            document.getElementById('mainBtn').className = "btn-start";
            lastAlt = null;
        }
    }

    function update(pos) {
        const { latitude, longitude, altitude } = pos.coords;
        const current = [latitude, longitude];

        // Høyde og stigning
        if (altitude !== null) {
            const roundedAlt = Math.round(altitude);
            document.getElementById('elev').innerText = roundedAlt;
            if (lastAlt !== null && roundedAlt > lastAlt) {
                totalGain += (roundedAlt - lastAlt);
                document.getElementById('gain').innerText = totalGain;
            }
            lastAlt = roundedAlt;
        }

        // Distanseberegning
        if (coords.length > 0) {
            const prev = coords[coords.length - 1];
            const d = getDist(prev[0], prev[1], latitude, longitude);
            if (d > 0.005) { // Bare tell bevegelser over 5 meter
                totalDist += d;
                document.getElementById('dist').innerText = totalDist.toFixed(2);
            }
        }

        coords.push(current);
        path.setLatLngs(coords);
        map.panTo(current);
    }

    function getDist(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }
</script>

</body>
</html>
